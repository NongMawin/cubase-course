<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Login | Cubase Masterclass</title>
    <link rel="icon" type="image/png" href="image_5a483c.png">
    <style>
        :root { --primary: #2ea043; --bg: #05070a; --card: #161b22; --border: #30363d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border); border-radius: 8px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .toggle-link { font-size: 12px; color: #8b949e; cursor: pointer; margin-top: 15px; display: block; }
    </style>
</head>
<body>
    <div class="container" id="login-box">
        <h2 style="color: var(--primary)">เข้าสู่ระบบ</h2>
        <form onsubmit="handleLogin(event)">
            <input type="email" id="login-email" placeholder="Gmail" required>
            <input type="password" id="login-pass" placeholder="รหัสผ่าน" required>
            <button type="submit">เข้าสู่ระบบ</button>
        </form>
        <span class="toggle-link" onclick="toggleForm()">สมัครสมาชิก</span>
    </div>

    <div class="container" id="reg-box" style="display: none;">
        <h2 style="color: var(--primary)">สมัครสมาชิก</h2>
        <form onsubmit="handleRegister(event)">
            <input type="text" id="reg-name" placeholder="ชื่อเล่น" required>
            <input type="email" id="reg-email" placeholder="Gmail" required>
            <input type="password" id="reg-pass" placeholder="รหัสผ่าน" required>
            <button type="submit">ยืนยันการสมัคร</button>
        </form>
        <span class="toggle-link" onclick="toggleForm()">เข้าสู่ระบบ</span>
    </div>

    <script>
        function toggleForm() {
            document.getElementById('login-box').style.display = document.getElementById('login-box').style.display === 'none' ? 'block' : 'none';
            document.getElementById('reg-box').style.display = document.getElementById('reg-box').style.display === 'none' ? 'block' : 'none';
        }
        function handleRegister(e) {
            e.preventDefault();
            localStorage.setItem('studentName', document.getElementById('reg-name').value);
            localStorage.setItem('savedEmail', document.getElementById('reg-email').value);
            localStorage.setItem('savedPassword', document.getElementById('reg-pass').value);
            alert("สมัครสำเร็จ!"); toggleForm();
        }
        function handleLogin(e) {
            e.preventDefault();
            if (document.getElementById('login-email').value === localStorage.getItem('savedEmail') && 
                document.getElementById('login-pass').value === localStorage.getItem('savedPassword')) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "home.html";
            } else { alert("ข้อมูลไม่ถูกต้อง"); }
        }
    </script>
</body>
</html>
