<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Cubase Masterclass</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #00adef; --danger: #f85149; --bg: #0b0e14; --card: #161b22; --border: #30363d; }
        body { font-family: 'Tahoma', sans-serif; background: var(--bg); color: white; margin: 0; padding: 40px; }
        .admin-container { max-width: 600px; margin: 0 auto; }
        
        /* Dashboard Card */
        .stat-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--primary); text-align: center; margin-bottom: 30px; box-shadow: 0 0 20px rgba(0, 173, 239, 0.1); }
        h1 { font-size: 3rem; color: var(--primary); margin: 10px 0; }

        /* Management Box */
        .management-box { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; color: #8b949e; }
        
        .user-info { background: #0d1117; padding: 20px; border-radius: 10px; border: 1px solid var(--border); margin-top: 15px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: #05070a; border: 1px solid var(--border); border-radius: 8px; color: white; box-sizing: border-box; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-update { background: var(--primary); color: white; }
        .btn-delete { background: none; border: 1px solid var(--danger); color: var(--danger); }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Custom Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--danger); text-align: center; width: 320px; }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- สถิติรวม -->
        <div class="stat-card">
            <p>จำนวนสมาชิกทั้งหมด</p>
            <h1 id="count-display">0</h1>
            <button onclick="location.reload()" style="background:none; color:var(--primary); border:none; font-size:12px; cursor:pointer;">
                <i class="fas fa-sync-alt"></i> รีเฟรชข้อมูล
            </button>
        </div>

        <!-- ระบบจัดการสมาชิก -->
        <div class="management-box">
            <h3><i class="fas fa-users-cog"></i> จัดการบัญชีนักเรียน</h3>
            
            <div class="user-info">
                <div class="input-group">
                    <label>Gmail นักเรียนที่ต้องการจัดการ</label>
                    <input type="text" id="target-email" placeholder="ใส่อีเมลนักเรียนที่นี่..." readonly>
                    <p style="font-size: 11px; color: #8b949e; margin-top: 5px;">* ปัจจุบันระบบรองรับการจัดการบัญชีล่าสุดที่สมัครบนเครื่องนี้</p>
                </div>

                <div class="input-group">
                    <label>ชื่อเล่นนักเรียน (เปลี่ยนได้ที่นี่)</label>
                    <input type="text" id="edit-name" placeholder="ชื่อเล่นใหม่">
                </div>

                <div class="action-btns">
                    <button class="btn-update" onclick="updateStudentName()">บันทึกชื่อใหม่</button>
                    <button class="btn-delete" onclick="showDeleteModal()">ลบบัญชีนี้</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal ยืนยันการลบ -->
    <div id="admin-delete-modal" class="modal-overlay">
        <div class="modal-card">
            <i class="fas fa-user-times" style="font-size: 2rem; color: var(--danger);"></i>
            <h3 style="color: white;">ยืนยันการลบ?</h3>
            <p style="color: #8b949e; font-size: 14px;">คุณกำลังจะลบบัญชีนักเรียนคนนี้ออกจากระบบ</p>
            <div class="action-btns">
                <button style="background:#30363d; color:white;" onclick="closeModal()">ยกเลิก</button>
                <button style="background:var(--danger); color:white;" onclick="confirmDeleteUser()">ยืนยันลบ</button>
            </div>
        </div>
    </div>

    <script>
        // ดึงข้อมูลมาแสดงผลตอนโหลดหน้า
        window.onload = function() {
            const total = localStorage.getItem('totalStudents') || 0;
            const currentStudentEmail = localStorage.getItem('savedEmail') || "ไม่มีข้อมูล";
            const currentStudentName = localStorage.getItem('studentName') || "";

            document.getElementById('count-display').innerText = total;
            document.getElementById('target-email').value = currentStudentEmail;
            document.getElementById('edit-name').value = currentStudentName;
        };

        // ฟังก์ชันเปลี่ยนชื่อเล่นนักเรียน
        function updateStudentName() {
            const newName = document.getElementById('edit-name').value;
            if(newName.trim() === "") {
                alert("กรุณาใส่ชื่อเล่น");
                return;
            }
            localStorage.setItem('studentName', newName);
            alert("เปลี่ยนชื่อนักเรียนเรียบร้อย!");
            location.reload();
        }

        // ระบบ Modal
        function showDeleteModal() { document.getElementById('admin-delete-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('admin-delete-modal').style.display = 'none'; }

        // ฟังก์ชันลบบัญชีนักเรียน
        function confirmDeleteUser() {
            // ลบข้อมูลบัญชี
            localStorage.removeItem('savedEmail');
            localStorage.removeItem('savedPassword');
            localStorage.removeItem('studentName');
            localStorage.removeItem('isLoggedIn');

            // ลดจำนวนสถิตินักเรียนลง 1
            let total = parseInt(localStorage.getItem('totalStudents') || 0);
            if(total > 0) {
                localStorage.setItem('totalStudents', total - 1);
            }

            alert("ลบบัญชีนักเรียนคนนี้เรียบร้อยแล้ว");
            location.reload();
        }
    </script>
</body>
</html>
